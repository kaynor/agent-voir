name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Test gateway
        run: cd apps/gateway && go test ./...
      - name: Test registry API
        run: cd apps/registry-api && go test ./...
      - name: Test token-accounting
        run: cd services/token-accounting && go test ./...
      - name: Test Go SDK
        run: cd packages/sdk-go && go test ./...

  migrations:
    name: PostgreSQL migration up/down
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentvoir
          POSTGRES_PASSWORD: agentvoir
          POSTGRES_DB: agentvoir
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentvoir -d agentvoir"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Test migrations
        env:
          POSTGRES_DSN: postgres://agentvoir:agentvoir@localhost:5432/agentvoir?sslmode=disable
        run: ./scripts/test-migrations.sh

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4

  license-check:
    name: License scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@v2.0.1
      - name: Scan gateway licenses
        run: cd apps/gateway && go-licenses check ./...
      - name: Scan registry-api licenses
        run: cd apps/registry-api && go-licenses check ./...
      - name: Scan token-accounting licenses
        run: cd services/token-accounting && go-licenses check ./...

  node:
    name: Node checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Web install
        run: cd apps/web && npm install
      - name: Web lint
        run: cd apps/web && npm run lint
      - name: TypeScript SDK install
        run: cd packages/sdk-typescript && npm install
      - name: TypeScript SDK test
        run: cd packages/sdk-typescript && npm test

  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install SDK
        run: cd packages/sdk-python && pip install -e '.[dev]'
      - name: Lint SDK
        run: cd packages/sdk-python && ruff check .
      - name: Test SDK
        run: cd packages/sdk-python && pytest
