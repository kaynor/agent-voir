name: Release container images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish (e.g. latest or v1.0.0)
        required: true
        default: latest

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  actions: read

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build AgentVoir image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployments/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Registry-only attestation; SBOM is generated in the next step as a workflow artifact.
          provenance: mode=min

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.meta.outputs.tag }}
          artifact-name: sbom-agentvoir-${{ steps.meta.outputs.tag }}.spdx.json
          output-file: sbom-agentvoir.spdx.json
          upload-release-assets: false

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.meta.outputs.tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ github.repository }}@${DIGEST}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Pack onebox run bundle
        run: |
          chmod +x scripts/pack-onebox-bundle.sh
          ./scripts/pack-onebox-bundle.sh "${{ steps.meta.outputs.tag }}" "${{ env.REGISTRY }}/${{ github.repository }}" "${{ github.repository }}"
          if grep -q '__RELEASE_TAG__' dist/run-agentvoir.sh; then
            echo "ERROR: run-agentvoir.sh still contains __RELEASE_TAG__ placeholder" >&2
            exit 1
          fi
          echo "Installer pinned to: $(grep DEFAULT_RELEASE_TAG dist/run-agentvoir.sh | head -1)"

      - name: Upload onebox bundle to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          gh release upload "$TAG" \
            "dist/agentvoir-onebox-${TAG}.zip" \
            "dist/run-agentvoir.sh" \
            --clobber

      - name: Add Docker quick start to release page
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          REPO="${{ github.repository }}"
          BODY="$(gh release view "$TAG" --json body -q .body)"
          if echo "$BODY" | grep -q 'agentvoir-quickstart'; then
            echo "Quick start already on release page"
            exit 0
          fi
          QUICKSTART="$(sed -e "s|__TAG__|${TAG}|g" -e "s|__REPO__|${REPO}|g" .github/release-quickstart.md)"
          gh release edit "$TAG" --notes "${QUICKSTART}${BODY}"

      - name: Upload onebox bundle artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: agentvoir-onebox-bundle
          path: |
            dist/agentvoir-onebox-*.zip
            dist/run-agentvoir.sh
