services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentvoir
      POSTGRES_USER: agentvoir
      POSTGRES_PASSWORD: agentvoir
    ports:
      - "5432:5432"
    volumes:
      - agentvoir-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - agentvoir-redis:/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.6
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - agentvoir-clickhouse:/var/lib/clickhouse

  opa:
    image: openpolicyagent/opa:0.67.1
    command: ["run", "--server", "--addr", ":8181", "/policies"]
    ports:
      - "8181:8181"
    volumes:
      - ../../policies/opa:/policies:ro

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ../../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: agentvoir
    volumes:
      - agentvoir-grafana:/var/lib/grafana

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../../observability/otel/collector.yml:/etc/otelcol/config.yml:ro

volumes:
  agentvoir-postgres:
  agentvoir-redis:
  agentvoir-clickhouse:
  agentvoir-grafana:
