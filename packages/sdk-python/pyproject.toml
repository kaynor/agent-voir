[project]
name = "agentvoir"
version = "0.1.0"
description = "Python SDK for AgentVoir"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "AgentVoir maintainers" }]
dependencies = [
  "httpx>=0.27.0",
  "pydantic>=2.7.0"
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0.0",
  "ruff>=0.5.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
